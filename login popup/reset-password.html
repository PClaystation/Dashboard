<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset Password | Continental ID</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #565656, #282828);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      color: #1f2937;
    }
    .panel {
      width: min(420px, 100%);
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.18);
      padding: 2rem;
    }
    .logo {
      display: block;
      margin: 0 auto 0.75rem;
      max-width: 170px;
      height: auto;
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.7rem;
      text-align: center;
    }
    p {
      margin: 0 0 1rem;
      color: #4b5563;
      line-height: 1.5;
    }
    form { margin-top: 1rem; }
    form[hidden] { display: none; }
    input {
      width: 100%;
      padding: 12px 14px;
      margin: 0 0 0.85rem;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
    }
    input:focus {
      outline: none;
      border-color: #4b5563;
    }
    button {
      width: 100%;
      padding: 12px 14px;
      border: none;
      border-radius: 8px;
      background: #4b5563;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }
    .status {
      min-height: 22px;
      margin-top: 1rem;
      font-weight: 600;
    }
    .back-link {
      display: inline-block;
      margin-top: 1rem;
      color: #374151;
      text-decoration: none;
    }
    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main class="panel">
    <img src="C2.png" alt="Continental ID" class="logo" />
    <h1 id="heading">Reset Password</h1>
    <p id="description">
      Request a reset link or finish resetting your password if you arrived here from email.
    </p>

    <form id="request-form" novalidate>
      <input
        id="request-identifier"
        type="text"
        autocomplete="username"
        placeholder="Email or username"
        required
      />
      <button id="request-btn" type="submit">Send Reset Link</button>
    </form>

    <form id="reset-form" novalidate hidden>
      <input id="reset-password" type="password" autocomplete="new-password" placeholder="New password" required />
      <input id="reset-confirm" type="password" autocomplete="new-password" placeholder="Confirm new password" required />
      <button id="reset-btn" type="submit">Reset Password</button>
    </form>

    <div id="status" class="status" aria-live="polite"></div>
    <a id="back-link" class="back-link" href="popup.html">Back to Login</a>
  </main>

  <script>
    const LOCAL_HOSTS = new Set(['localhost', '127.0.0.1']);
    const TRUSTED_API_ORIGINS = new Set([
      'https://dashboard.continental-hub.com',
      'https://grimoire.continental-hub.com',
      'https://login.continental-hub.com',
      'https://mpmc.ddns.net',
    ]);
    const params = new URLSearchParams(window.location.search);
    const token = String(params.get('token') || '').trim();

    const trimTrailingSlash = (value) => String(value || '').replace(/\/+$/, '');

    const isTrustedApiOrigin = (origin) => {
      if (!origin) return false;

      try {
        const parsed = new URL(origin);
        if (LOCAL_HOSTS.has(parsed.hostname)) return true;
        return TRUSTED_API_ORIGINS.has(parsed.origin);
      } catch {
        return false;
      }
    };

    const resolveTrustedApiBaseUrl = (value) => {
      if (!value) return '';

      try {
        const resolved = new URL(value, window.location.origin);
        return isTrustedApiOrigin(resolved.origin) ? trimTrailingSlash(resolved.origin) : '';
      } catch {
        return '';
      }
    };

    const getDefaultApiBaseUrl = () => {
      if (LOCAL_HOSTS.has(window.location.hostname)) {
        return 'http://localhost:5000';
      }

      if (
        window.location.hostname === 'dashboard.continental-hub.com' ||
        window.location.hostname === 'login.continental-hub.com'
      ) {
        return 'https://grimoire.continental-hub.com';
      }

      return window.location.origin;
    };

    const API_BASE_URL =
      resolveTrustedApiBaseUrl(params.get('apiBaseUrl')) ||
      resolveTrustedApiBaseUrl(window.__API_BASE_URL__) ||
      trimTrailingSlash(getDefaultApiBaseUrl());
    const AUTH_API_BASE = `${API_BASE_URL}/api/auth`;

    const heading = document.getElementById('heading');
    const description = document.getElementById('description');
    const requestForm = document.getElementById('request-form');
    const resetForm = document.getElementById('reset-form');
    const requestBtn = document.getElementById('request-btn');
    const resetBtn = document.getElementById('reset-btn');
    const status = document.getElementById('status');
    const backLink = document.getElementById('back-link');

    const popupUrl = new URL('popup.html', window.location.href);
    if (params.get('origin')) popupUrl.searchParams.set('origin', params.get('origin'));
    if (params.get('redirect')) popupUrl.searchParams.set('redirect', params.get('redirect'));
    if (params.get('apiBaseUrl')) popupUrl.searchParams.set('apiBaseUrl', params.get('apiBaseUrl'));
    backLink.href = popupUrl.toString();

    const setStatus = (message, color = '#b91c1c') => {
      status.textContent = message;
      status.style.color = color;
    };

    const setBusy = (button, busy, label) => {
      button.disabled = busy;
      if (label) button.textContent = label;
    };

    if (token) {
      heading.textContent = 'Choose a New Password';
      description.textContent = 'Enter a strong new password to finish resetting your account.';
      requestForm.hidden = true;
      resetForm.hidden = false;
    }

    requestForm.addEventListener('submit', async (event) => {
      event.preventDefault();

      const identifier = document.getElementById('request-identifier').value.trim();
      if (!identifier) {
        setStatus('Email or username is required.');
        return;
      }

      setBusy(requestBtn, true, 'Sending...');
      setStatus('Working...', '#374151');

      try {
        const response = await fetch(`${AUTH_API_BASE}/request-password-reset`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier }),
        });
        const data = await response.json().catch(() => ({}));
        setStatus(
          data.message || 'If the account exists, a reset link will arrive shortly.',
          '#047857'
        );
      } catch (error) {
        setStatus(error.message || 'Could not request a password reset.');
      } finally {
        setBusy(requestBtn, false, 'Send Reset Link');
      }
    });

    resetForm.addEventListener('submit', async (event) => {
      event.preventDefault();

      const newPassword = document.getElementById('reset-password').value;
      const confirmPassword = document.getElementById('reset-confirm').value;

      if (!newPassword || !confirmPassword) {
        setStatus('Both password fields are required.');
        return;
      }

      if (newPassword !== confirmPassword) {
        setStatus('Passwords do not match.');
        return;
      }

      setBusy(resetBtn, true, 'Resetting...');
      setStatus('Working...', '#374151');

      try {
        const response = await fetch(`${AUTH_API_BASE}/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword }),
        });
        const data = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(data.message || 'Could not reset your password.');
        }

        setStatus(data.message || 'Password reset complete. You can sign in now.', '#047857');
      } catch (error) {
        setStatus(error.message || 'Could not reset your password.');
      } finally {
        setBusy(resetBtn, false, 'Reset Password');
      }
    });
  </script>
</body>
</html>
